openapi: 3.0.4
info:
  title: Car API
  version: 1.0.0
  description: API for managing cars.

paths:
  /cars:
    get:
      summary: List all cars.
      description: Retrieve a list of all cars.
      responses:
        '200':
          description: A list of cars.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
    post:
      summary: Create a new car.
      description: Add a new car.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Response"
      responses:
        '201':
          description: Car created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
        '400':
          description: Bad request due malformed JSON, or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
  /cars/{id}:
    get:
      summary: Get a car by ID.
      description: Retrieve a specific car using its ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Car details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
        '400':
          description: Bad request due to invalid ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
        '404':
          description: Car not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
    put:
      summary: Update a car by ID.
      description: Modify details of an existing car.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Response"
      responses:
        '200':
          description: Car updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
        '400':
          description: Bad request due to invalid ID, malformed JSON, or validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
        '404':
          description: Car not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
    delete:
      summary: Delete a car by ID.
      description: |
        Permanently deletes a car resource identified by its ID.
        This operation is irreversible.
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the car to delete.
          schema:
            type: string
      responses:
        "204":
          description: Car deleted successfully. No content is returned.
        "400":
          description: Invalid or missing car ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Car not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    CarResponse:
      type: object
      description: Represents a car returned by the API.
      required:
        - id
        - make
        - model
        - color
        - category
        - year
      properties:
        id:
          type: string
          description: Unique identifier of the car.
          example: "5f2b3e8a"
        make:
          type: string
          description: Manufacturer of the car.
          example: Toyota
        model:
          type: string
          description: Model name.
          example: Corolla
        color:
          type: string
          description: Exterior color.
          example: Black
        category:
          type: string
          description: Vehicle category.
          example: Sedan
        year:
          type: integer
          format: int32
          description: Manufacturing year.
          example: 2024
        package:
          type: string
          nullable: true
          description: Optional package level.
          example: XLE
        mileage:
          type: integer
          format: int64
          nullable: true
          description: Mileage of the car.
          example: 18500
        price:
          type: integer
          format: int64
          nullable: true
          description: Price of the car in cents.
          example: 2599000
    CarsResponse:
      type: array
      items:
        $ref: "#/components/schemas/CarResponse"
    Response:
      type: object
      properties:
        data:
          description: The response data.
          oneOf:
            - $ref: "#/components/schemas/CarResponse"
            - $ref: "#/components/schemas/CarsResponse"
        error:
          type: string
          description: Error message or empty if no error.